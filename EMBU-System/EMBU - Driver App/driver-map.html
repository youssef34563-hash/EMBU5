<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMBU - Driver Map</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    font-family:Poppins;
    background: radial-gradient(circle at center, #121212 0%, #0f1115 100%);
    color:white;
    overflow-x:hidden;
}

/* glow */
.circle1,.circle2{
    position:absolute;
    border-radius:50%;
    filter:blur(85px);
    z-index:0;
}

.circle1{
    width:320px;
    height:320px;
    background:#ff3b30;
    top:-100px;
    left:-100px;
    opacity:0.7;
}

.circle2{
    width:300px;
    height:300px;
    background:#7a0000;
    bottom:-100px;
    right:-100px;
    opacity:0.6;
}

.container{
    position:relative;
    z-index:1;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:20px;
    font-weight:700;
}

.status{
    background:#00c853;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}

/* HOME BUTTON */
.homeBtn{
    padding:6px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.05);
    color:white;
    cursor:pointer;
    font-size:12px;
    transition:0.3s;
}

.homeBtn:hover{
    background:rgba(255,255,255,0.15);
}

.card{
    margin-top:15px;
    padding:20px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
}

.big{
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
}

.info{
    color:#ccc;
    font-size:14px;
    margin-top:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#ff3b30;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}

#map{
    width:100%;
    height:260px;
    border-radius:20px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="container">

<!-- HEADER -->
<div class="header">

  <div class="logo">🚑 EMBU DRIVER</div>

  <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">

      <div class="status">LIVE</div>

      <button class="homeBtn" onclick="goHome()">
          🏠 Home
      </button>

  </div>

</div>

<!-- INFO -->
<div class="card">
<div class="big">🚨 Active Emergency</div>

<div class="info">👤 Name: <span id="name">-</span></div>
<div class="info">📞 Phone: <span id="phone">-</span></div>
<div class="info">🩺 Reason: <span id="reason">-</span></div>
<div class="info">❤️ Condition: <span id="condition">-</span></div>
<div class="info">📍 Address: <span id="address">-</span></div>
<div class="info">⏰ Time: <span id="time">-</span></div>
<div class="info">📡 Status: <span id="status">-</span></div>
<div class="info">🚨 Severity: <span id="severity">-</span></div>

</div>

<!-- MAP -->
<div class="card">
<div class="big">🗺️ Live Map</div>
<div id="map"></div>

<div class="info">Lat: <span id="lat">-</span></div>
<div class="info">Lng: <span id="lng">-</span></div>

<button onclick="openMaps()">Open Google Maps</button>
<button onclick="window.location.href='hospital-map.html'">Hospital Map</button>
</div>

</div>

<script>

let request = JSON.parse(localStorage.getItem("embo_driver_current"));

let map;
let driverMarker;
let patientMarker;
let routeLine;

// fake accident near patient
function generateFakeAccident(lat, lng){
    return {
        lat: lat + (Math.random() - 0.5) * 0.01,
        lng: lng + (Math.random() - 0.5) * 0.01
    };
}

function render(){

if(!request){
    ["name","phone","reason","condition","address","time","status","severity"].forEach(id=>{
        document.getElementById(id).innerText = "-";
    });
    return;
}

document.getElementById("name").innerText = request.name;
document.getElementById("phone").innerText = request.phone;
document.getElementById("reason").innerText = request.reason;
document.getElementById("condition").innerText = request.condition;
document.getElementById("address").innerText = request.address;
document.getElementById("time").innerText = request.time;
document.getElementById("status").innerText = request.status;
document.getElementById("severity").innerText = request.severity;

document.getElementById("lat").innerText = request.lat;
document.getElementById("lng").innerText = request.lng;

}

function initMap(){

let driverStart = [30.0444, 31.2357];

map = L.map('map').setView(driverStart, 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ambulance marker
driverMarker = L.marker(driverStart).addTo(map)
.bindPopup("🚑 Ambulance");

// patient + accident
if(request){

let patientPos = generateFakeAccident(request.lat, request.lng);

patientMarker = L.marker([patientPos.lat, patientPos.lng]).addTo(map)
.bindPopup("🚨 Accident");

drawLine(driverStart, [patientPos.lat, patientPos.lng]);
}

watchDriver();
render();
}

function watchDriver(){

navigator.geolocation.watchPosition(pos => {

let driverPos = [pos.coords.latitude, pos.coords.longitude];

driverMarker.setLatLng(driverPos);
map.setView(driverPos);

if(patientMarker){
    drawLine(driverPos, patientMarker.getLatLng());
}

});

}

function drawLine(from, to){

if(routeLine){
    map.removeLayer(routeLine);
}

routeLine = L.polyline([from, to], {
    color: "red",
    weight: 4
}).addTo(map);

}

function openMaps(){

if(!request) return;

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${request.lat},${request.lng}`,
"_blank"
);
}

/* 🏠 HOME BUTTON */
function goHome(){

let ok = confirm("⚠️ Leaving will CANCEL the current emergency task. Continue?");
if(!ok) return;

// remove task
localStorage.removeItem("embo_driver_current");

// redirect
window.location.href = "driver-home.html";
}

window.onload = () => {
initMap();
render();
};



</script>

</body>
</html>
