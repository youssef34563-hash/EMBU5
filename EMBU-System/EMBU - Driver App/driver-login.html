<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMBU - Driver Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Poppins;
    background: radial-gradient(circle at center, #121212 0%, #0f1115 100%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* glow نفس بتاع الهوم */
.circle1,.circle2{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    z-index:0;
}

.circle1{
    width:320px;
    height:320px;
    background:#ff3b30;
    top:-100px;
    left:-100px;
    opacity:0.7;
}

.circle2{
    width:300px;
    height:300px;
    background:#b71c1c;
    bottom:-100px;
    right:-100px;
    opacity:0.6;
}

/* LOGIN CARD */
.login-card{
    position:relative;
    z-index:1;
    width:340px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    text-align:center;
}

h2{
    margin-bottom:10px;
}

p{
    color:#bbb;
    font-size:13px;
    margin-bottom:20px;
}

/* inputs */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    color:white;
    outline:none;
}

input:focus{
    border-color:#ff3b30;
}

/* button */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#ff3b30;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,59,48,0.4);
}

</style>
</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="login-card">

    <h2>🚑 EMBU DRIVER</h2>
    <p>Login to access ambulance system</p>

    <input id="code" placeholder="Driver Code">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<script>

function login(){

let code = document.getElementById("code").value;
let pass = document.getElementById("pass").value;

if(code === "" || pass === ""){
alert("Fill all fields");
return;
}

/////////////////////////////////////////////////////
// 🔐 EMBO MASTER LOGIN
/////////////////////////////////////////////////////

if(code === "EMBO" && pass === "1234"){

localStorage.setItem("embo_driver_logged","true");
localStorage.setItem("embo_driver_user", JSON.stringify({
code: "EMBO",
name: "EMBO Driver",
status: "online"
}));

window.location.href = "driver-home.html";

}else{
alert("Invalid EMBO credentials");
}

}

</script>

</body>
</html>
